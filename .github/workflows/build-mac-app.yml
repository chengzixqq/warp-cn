name: Build Mac App (unsigned)

# 两种触发：
# 1) workflow_dispatch（手动）：开发者按需出包，不发布 release。
# 2) push tags v*：自动构建 + minisign 签名 + 创建 GitHub Release，
#    供 in-app github_update 拉取。tag 触发使用固定参数（oss/aarch64/debug）
#    走最快路径；正式 release 想换 profile/arch 仍可手动 dispatch。
on:
  workflow_dispatch:
    inputs:
      channel:
        description: '发布档次 (oss=无 Sentry/外部依赖；dev=带调试断言；local=本地开发)'
        required: true
        default: oss
        type: choice
        options:
          - oss
          - dev
          - local
      arch:
        description: '目标架构'
        required: true
        default: aarch64
        type: choice
        options:
          - aarch64
          - x86_64
      profile:
        description: '编译 profile (debug=cargo dev profile, ~25-35 min；release=release-lto, 200+ min on free runner)'
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release
  push:
    tags:
      - 'v*'

# tag 触发时需要 contents:write 才能调 `gh release create`。
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ inputs.channel || 'oss' }} (${{ inputs.arch || 'aarch64' }})
    # 用 GitHub 免费 macos-14（M1 4-core）。自托管 LaunchAgent 跑 create-dmg 时
    # AppleScript 控 Finder 必超时（无 Aqua GUI session），DMG 美化无法完成；
    # 美化要的话只能走 hosted runner 或 ./run.sh 前台模式（不稳）。
    # 见 commit 历史里 4e32f9 / 59ff1f 的 self-hosted 切换尝试。
    runs-on: macos-14
    # release-lto on free macos-14 (4-core M1) needs 200+ min cold; debug profile ~25-35 min.
    # 240 min covers a cold release build with margin.
    timeout-minutes: 240

    env:
      # 与 script/macos/bundle 中保持一致
      MACOSX_DEPLOYMENT_TARGET: "10.14"
      # 让 install_channel_config 优雅退出（外部 fork 没有私有仓库 SSH 访问）
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # app/build.rs 用 `git describe --tags` 把 GIT_RELEASE_TAG 烧进二进制；
          # 默认 shallow clone 不拉 tag，会让产物显示 0.1.0-dev fallback。
          fetch-tags: true

      - name: Show runner info
        run: |
          uname -m
          sw_vers
          xcodebuild -version
          df -h /

      - name: Add Rust target
        run: rustup target add ${{ inputs.arch || 'aarch64' }}-apple-darwin

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          # 不同架构 / 档次 / profile 分别缓存（profile 影响 target 子目录与编译产物）
          key: mac-${{ inputs.arch || 'aarch64' }}-${{ inputs.channel || 'oss' }}-${{ inputs.profile || 'debug' }}
          # 只在 master 上保存缓存，分支只读
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install protoc
        run: brew install protobuf

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '20.9.0'

      - name: Enable corepack
        run: corepack enable

      - name: Install cargo-bundle
        # 使用 bootstrap 脚本中固定的 fork 修订版，与正式构建保持一致
        run: |
          cargo install cargo-bundle \
            --git https://github.com/burtonageo/cargo-bundle \
            --rev ae4c76e92c08774bf54ff077b1c52e3d1cd6c16d

      - name: Install cargo-about (license generation)
        run: cargo install --locked cargo-about@0.8.4

      # 自托管 macOS runner 在 launchd 服务上下文下 find 得到 login.keychain 的
      # Apple Development cert（returns metadata），但用不了它的私钥（errSecInternalComponent，
      # 因为 launchd agent 无法解锁用户 keychain）。
      # 解决：把当前用户的 keychain search list 临时切到一个空 keychain，
      # 让 script/macos/bundle 里的 `security find-identity` 返回 0 个 identity，
      # selfsign 分支自动 fall through 到 ad-hoc 签名（SIGNING_CERT="-"）。
      # 免费 macos-14 runner 不需要这步因为本来就没装 cert。
      - name: Force ad-hoc signing on self-hosted runner
        if: ${{ runner.environment != 'github-hosted' }}
        run: |
          set -eu
          BUILD_KC=/tmp/warp-build-empty.keychain-db
          security delete-keychain "$BUILD_KC" 2>/dev/null || true
          security create-keychain -p "" "$BUILD_KC"
          # 备份原 search list 以便后面恢复
          security list-keychains -d user > /tmp/warp-build-prev-keychains.txt
          security list-keychains -d user -s "$BUILD_KC"
          echo "::group::find-identity after switch (should be empty)"
          security find-identity -p codesigning -v || true
          echo "::endgroup::"

      - name: Build & bundle
        id: bundle
        # --selfsign 会用本地 Apple Development 证书自签；运行时找不到证书时回退到 ad-hoc 签名，
        # 比 --nosign 在 macOS 上启动体验更好（仍需用户右键 Open 一次绕过 Gatekeeper）。
        # --debug 走 cargo dev profile，无 LTO，编译快很多但产物大。
        # RUNNER_NAME=nsc-* 是 bundle 脚本里 create-dmg 跳过 AppleScript Finder 美化的开关（脚本里写死的路径名）。
        # 自托管 LaunchAgent 没有 Aqua GUI session，AppleScript 控 Finder 必超时；借用这个旁路跳过它。
        # 副作用：DMG 没有自定义背景/图标布局，仅功能可用。
        env:
          RUNNER_NAME: ${{ runner.environment != 'github-hosted' && format('nsc-{0}', runner.name) || runner.name }}
        run: |
          set -eu
          # 双保险：tag 触发时把 ref 直接喂给 app/build.rs；branch/workflow_dispatch
          # 触发时留空，让 build.rs 走 `git describe` 自动探测（依赖 fetch-tags）。
          if [ "${{ github.ref_type }}" = "tag" ]; then
            export GIT_RELEASE_TAG="${{ github.ref_name }}"
            echo "GIT_RELEASE_TAG=$GIT_RELEASE_TAG (from tag ref)"
          fi
          BUNDLE_ARGS=(
            --selfsign
            --channel "${{ inputs.channel || 'oss' }}"
            --arch "${{ inputs.arch || 'aarch64' }}"
            --dmg-name-suffix "${{ inputs.arch || 'aarch64' }}"
          )
          if [ "${{ inputs.profile || 'debug' }}" = "debug" ]; then
            BUNDLE_ARGS+=(--debug)
          fi
          ./script/bundle "${BUNDLE_ARGS[@]}"
        shell: bash

      - name: Determine artifact paths
        id: paths
        run: |
          set -eu
          DMG_PATH="${{ steps.bundle.outputs.dmg_path }}"
          APP_DIR="$(dirname "$DMG_PATH")"
          # 找到 .app 目录
          APP_BUNDLE="$(ls -d "$APP_DIR"/*.app | head -1)"
          echo "dmg_path=$DMG_PATH"          >> "$GITHUB_OUTPUT"
          echo "app_bundle=$APP_BUNDLE"      >> "$GITHUB_OUTPUT"
          echo "out_dir=$APP_DIR"            >> "$GITHUB_OUTPUT"
          ls -la "$APP_DIR"
        shell: bash

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: warp-${{ inputs.channel || 'oss' }}-${{ inputs.arch || 'aarch64' }}-${{ inputs.profile || 'debug' }}-dmg
          path: ${{ steps.paths.outputs.dmg_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload .app bundle (zipped)
        run: |
          cd "${{ steps.paths.outputs.out_dir }}"
          ditto -c -k --keepParent "$(basename "${{ steps.paths.outputs.app_bundle }}")" app-bundle.zip
        shell: bash

      - name: Upload .app artifact
        uses: actions/upload-artifact@v7
        with:
          name: warp-${{ inputs.channel || 'oss' }}-${{ inputs.arch || 'aarch64' }}-${{ inputs.profile || 'debug' }}-app
          path: ${{ steps.paths.outputs.out_dir }}/app-bundle.zip
          if-no-files-found: error
          retention-days: 14

      # ===== Auto-update release pipeline (tag push only) =====
      # 把 bundle 脚本产出的 .tar.gz 用 minisign 签名，然后建/更新 GitHub Release。
      # 进程内 reqwest 下载 + tar 解压不会附加 com.apple.quarantine xattr，
      # 因此 ad-hoc 签名 .app 替换后 Gatekeeper 不会重新评估，更新对用户静默。
      # 见 app/src/github_update/install.rs。
      - name: Install rsign2 (minisign signer)
        if: github.ref_type == 'tag'
        run: cargo install --quiet --locked rsign2

      - name: Sign tarball with minisign
        if: github.ref_type == 'tag'
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -eu
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "::error::MINISIGN_SECRET_KEY secret is not set; run script/generate_update_keys.sh and add the secret key to repo secrets."
            exit 1
          fi
          TARBALL="${{ steps.bundle.outputs.tarball_path }}"
          if [ -z "$TARBALL" ] || [ ! -f "$TARBALL" ]; then
            echo "::error::bundle did not produce a tarball (tarball_path output empty)"
            exit 1
          fi
          SK_FILE="$(mktemp)"
          # 用 printf 而非 echo：echo 在 -e 默认开启的 sh 上会解释反斜杠，破坏私钥编码。
          printf '%s' "$MINISIGN_SECRET_KEY" > "$SK_FILE"
          rsign sign -W -s "$SK_FILE" "$TARBALL"
          rm -f "$SK_FILE"
          ls -la "${TARBALL}" "${TARBALL}.minisig"
        shell: bash

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          TAG="${{ github.ref_name }}"
          TARBALL="${{ steps.bundle.outputs.tarball_path }}"
          DMG="${{ steps.paths.outputs.dmg_path }}"
          # release 已存在则上传到现有 release（多架构构建分别上传到同一 tag）。
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists; uploading assets to it"
            gh release upload "$TAG" "$TARBALL" "${TARBALL}.minisig" "$DMG" --clobber
          else
            gh release create "$TAG" \
              "$TARBALL" "${TARBALL}.minisig" "$DMG" \
              --title "$TAG" \
              --generate-notes
          fi
        shell: bash

      # 把 keychain search list 还原成原样，避免后续在同一 runner 上的其他工作流受影响。
      - name: Restore keychain search list
        if: ${{ always() && runner.environment != 'github-hosted' }}
        run: |
          if [ -f /tmp/warp-build-prev-keychains.txt ]; then
            # macOS xargs 不支持 -a，用 stdin 重定向；list-keychains -d user -s 接受多个路径作参数。
            xargs security list-keychains -d user -s < /tmp/warp-build-prev-keychains.txt
            rm /tmp/warp-build-prev-keychains.txt
          fi
          security delete-keychain /tmp/warp-build-empty.keychain-db 2>/dev/null || true
