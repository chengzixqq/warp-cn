name: Build Mac App (unsigned)

# 仅手动触发，避免每次 push 都消耗 CI 分钟。
# 在仓库 Actions 页面点击 "Run workflow" 即可。
on:
  workflow_dispatch:
    inputs:
      channel:
        description: '发布档次 (oss=无 Sentry/外部依赖；dev=带调试断言；local=本地开发)'
        required: true
        default: oss
        type: choice
        options:
          - oss
          - dev
          - local
      arch:
        description: '目标架构'
        required: true
        default: aarch64
        type: choice
        options:
          - aarch64
          - x86_64
      profile:
        description: '编译 profile (debug=cargo dev profile, ~25-35 min；release=release-lto, 200+ min on free runner)'
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ inputs.channel }} (${{ inputs.arch }})
    # 优先用维护者的自托管 macOS runner（M1/M2 mac mini，比免费 macos-14 快 3-5 倍）。
    # 离线时 GitHub 自动排队等 runner，不会回退到 macos-14；如长期离线请改回 macos-14。
    runs-on: [self-hosted, macOS, ARM64]
    # release-lto 在 self-hosted M1/M2 mini 通常 30-60 min；debug ~10-15 min。240 min 留足余量。
    timeout-minutes: 240

    env:
      # 与 script/macos/bundle 中保持一致
      MACOSX_DEPLOYMENT_TARGET: "10.14"
      # 让 install_channel_config 优雅退出（外部 fork 没有私有仓库 SSH 访问）
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show runner info
        run: |
          uname -m
          sw_vers
          xcodebuild -version
          df -h /

      - name: Add Rust target
        run: rustup target add ${{ inputs.arch }}-apple-darwin

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          # 不同架构 / 档次 / profile 分别缓存（profile 影响 target 子目录与编译产物）
          key: mac-${{ inputs.arch }}-${{ inputs.channel }}-${{ inputs.profile }}
          # 只在 master 上保存缓存，分支只读
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install protoc
        run: brew install protobuf

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '20.9.0'

      - name: Enable corepack
        run: corepack enable

      - name: Install cargo-bundle
        # 使用 bootstrap 脚本中固定的 fork 修订版，与正式构建保持一致
        run: |
          cargo install cargo-bundle \
            --git https://github.com/burtonageo/cargo-bundle \
            --rev ae4c76e92c08774bf54ff077b1c52e3d1cd6c16d

      - name: Install cargo-about (license generation)
        run: cargo install --locked cargo-about@0.8.4

      # 自托管 macOS runner 在 launchd 服务上下文下 find 得到 login.keychain 的
      # Apple Development cert（returns metadata），但用不了它的私钥（errSecInternalComponent，
      # 因为 launchd agent 无法解锁用户 keychain）。
      # 解决：把当前用户的 keychain search list 临时切到一个空 keychain，
      # 让 script/macos/bundle 里的 `security find-identity` 返回 0 个 identity，
      # selfsign 分支自动 fall through 到 ad-hoc 签名（SIGNING_CERT="-"）。
      # 免费 macos-14 runner 不需要这步因为本来就没装 cert。
      - name: Force ad-hoc signing on self-hosted runner
        if: ${{ runner.environment != 'github-hosted' }}
        run: |
          set -eu
          BUILD_KC=/tmp/warp-build-empty.keychain-db
          security delete-keychain "$BUILD_KC" 2>/dev/null || true
          security create-keychain -p "" "$BUILD_KC"
          # 备份原 search list 以便后面恢复
          security list-keychains -d user > /tmp/warp-build-prev-keychains.txt
          security list-keychains -d user -s "$BUILD_KC"
          echo "::group::find-identity after switch (should be empty)"
          security find-identity -p codesigning -v || true
          echo "::endgroup::"

      - name: Build & bundle
        id: bundle
        # --selfsign 会用本地 Apple Development 证书自签；运行时找不到证书时回退到 ad-hoc 签名，
        # 比 --nosign 在 macOS 上启动体验更好（仍需用户右键 Open 一次绕过 Gatekeeper）。
        # --debug 走 cargo dev profile，无 LTO，编译快很多但产物大。
        run: |
          set -eu
          BUNDLE_ARGS=(
            --selfsign
            --channel "${{ inputs.channel }}"
            --arch "${{ inputs.arch }}"
            --dmg-name-suffix "${{ inputs.arch }}"
          )
          if [ "${{ inputs.profile }}" = "debug" ]; then
            BUNDLE_ARGS+=(--debug)
          fi
          ./script/bundle "${BUNDLE_ARGS[@]}"
        shell: bash

      - name: Determine artifact paths
        id: paths
        run: |
          set -eu
          DMG_PATH="${{ steps.bundle.outputs.dmg_path }}"
          APP_DIR="$(dirname "$DMG_PATH")"
          # 找到 .app 目录
          APP_BUNDLE="$(ls -d "$APP_DIR"/*.app | head -1)"
          echo "dmg_path=$DMG_PATH"          >> "$GITHUB_OUTPUT"
          echo "app_bundle=$APP_BUNDLE"      >> "$GITHUB_OUTPUT"
          echo "out_dir=$APP_DIR"            >> "$GITHUB_OUTPUT"
          ls -la "$APP_DIR"
        shell: bash

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: warp-${{ inputs.channel }}-${{ inputs.arch }}-${{ inputs.profile }}-dmg
          path: ${{ steps.paths.outputs.dmg_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload .app bundle (zipped)
        run: |
          cd "${{ steps.paths.outputs.out_dir }}"
          ditto -c -k --keepParent "$(basename "${{ steps.paths.outputs.app_bundle }}")" app-bundle.zip
        shell: bash

      - name: Upload .app artifact
        uses: actions/upload-artifact@v7
        with:
          name: warp-${{ inputs.channel }}-${{ inputs.arch }}-${{ inputs.profile }}-app
          path: ${{ steps.paths.outputs.out_dir }}/app-bundle.zip
          if-no-files-found: error
          retention-days: 14

      # 把 keychain search list 还原成原样，避免后续在同一 runner 上的其他工作流受影响。
      - name: Restore keychain search list
        if: ${{ always() && runner.environment != 'github-hosted' }}
        run: |
          if [ -f /tmp/warp-build-prev-keychains.txt ]; then
            # 把每行（被引号括着的路径）拼成 -s 的 N 个参数。
            xargs -a /tmp/warp-build-prev-keychains.txt security list-keychains -d user -s
            rm /tmp/warp-build-prev-keychains.txt
          fi
          security delete-keychain /tmp/warp-build-empty.keychain-db 2>/dev/null || true
