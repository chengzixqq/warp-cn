name: Build Windows App (unsigned)

# 参照 build-mac-app.yml 的 Windows 版本。回应 issue #10（社区求 Windows 安装包）。
#
# 两种触发：
# 1) workflow_dispatch（手动）：按需出包；channel / profile 可选。
# 2) push tags v*：固定 oss/release 出 InnoSetup 安装包，并作为 GitHub Release 资产上传
#    （Windows 暂不接入 in-app 自更新，仅提供可下载安装包，不做 minisign 签名）。
#
# 复用仓库已有的 script/windows/bundle.ps1 + windows-installer.iss，
# 它们已完整支持 oss channel（无 Sentry、bin=warp-oss、CARGO_BIN_NAME=oss）。
#
# 依赖：需要 PR #30（把 macOS 专属的 -Wl,-headerpad 链接参数限定到 macOS 目标）
# 先合并，否则该参数会传给 Windows 链接器导致 cargo build 失败。
# windows-latest 自带 VS 2022 Build Tools，embed-resource 经注册表定位 RC.EXE，
# 因此无需便携工具链的 WARP_RC（PR #31）。
on:
  workflow_dispatch:
    inputs:
      channel:
        description: '发布档次 (oss=无 Sentry/外部依赖；dev=带调试断言；local=本地开发)'
        required: true
        default: oss
        type: choice
        options:
          - oss
          - dev
          - local
      profile:
        description: '编译 profile (debug=cargo dev profile, ~30-40 min；release=release-lto, 200+ min on free runner)'
        required: true
        default: release
        type: choice
        options:
          - debug
          - release
  push:
    tags:
      - 'v*'

# tag 触发时需要 contents:write 才能调 `gh release upload`；
# actions:write 给 rust-cache 写入用。
permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build ${{ inputs.channel || 'oss' }} (x86_64)
    # 目前仅 x86_64：便携工具链与本地验证都在 x64 上做过；arm64-pc-windows 未覆盖测试。
    runs-on: windows-latest
    # release-lto 在免费 runner 上冷构建可达 200+ 分钟；debug profile 约 30-40 分钟。
    # 360 分钟给冷 release 构建留足余量。
    timeout-minutes: 360

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # app/build.rs 用 `git describe --tags` 把 GIT_RELEASE_TAG 烧进二进制；
          # 默认 shallow clone 不拉 tag，会让产物显示 0.1.0 fallback。
          fetch-tags: true

      - name: Show runner info
        shell: pwsh
        run: |
          systeminfo | Select-String "OS Name","OS Version" -ErrorAction SilentlyContinue
          rustc --version
          cargo --version
          Get-PSDrive C | Select-Object Used,Free

      - name: Add Rust target
        shell: pwsh
        run: rustup target add x86_64-pc-windows-msvc

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: win-x86_64-${{ inputs.channel || 'oss' }}-${{ inputs.profile || 'release' }}
          # 仅 master push 与 tag push 写缓存；PR / sync 分支只读，避免污染。
          save-if: ${{ github.ref == 'refs/heads/master' || github.ref_type == 'tag' }}

      - name: Install protoc
        shell: pwsh
        run: choco install protoc --no-progress -y

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          # 把 ISCC.exe 目录加入后续步骤的 PATH（bundle.ps1 通过 `& ISCC` 调用）。
          "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install cargo-about (license generation)
        # bundle.ps1 → prepare_bundled_resources.ps1 会无条件跑 `cargo about generate`
        # 生成 THIRD_PARTY_LICENSES.txt，缺该子命令则 bundle 步骤必失败。
        # 版本与 mac workflow / script/install_cargo_release_deps 保持一致。
        shell: pwsh
        run: cargo install --locked cargo-about@0.8.4

      - name: Build & bundle
        id: bundle
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # 确定版本号并显式传给 bundle.ps1（它把 $env:GIT_RELEASE_TAG 透传给
          # windows-installer.iss 的 /DMyAppVersion 与 prepare_bundled_resources.ps1）。
          # tag 触发用 ref 名；dispatch 触发用 `git describe` 推导，避免安装包版本号为空。
          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $releaseTag = $env:GITHUB_REF_NAME
          } else {
            $releaseTag = (git describe --tags --always 2>$null)
            if (-not $releaseTag) { $releaseTag = "0.0.0-$($env:GITHUB_SHA.Substring(0,7))" }
          }
          $env:GIT_RELEASE_TAG = $releaseTag
          Write-Output "GIT_RELEASE_TAG=$releaseTag"
          $channel = if ($env:INPUT_CHANNEL) { $env:INPUT_CHANNEL } else { 'oss' }
          $buildProfile = if ($env:INPUT_PROFILE) { $env:INPUT_PROFILE } else { 'release' }
          $bundleArgs = @('-CHANNEL', $channel, '-ARCH', 'x64', '-RELEASE_TAG', $releaseTag)
          if ($buildProfile -eq 'debug') { $bundleArgs += '-DEBUG_BUILD' }
          Write-Output "Running bundle.ps1 $bundleArgs"
          & .\script\windows\bundle.ps1 @bundleArgs
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_PROFILE: ${{ inputs.profile }}

      - name: Locate installer
        id: paths
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $installer = "${{ steps.bundle.outputs.installer_path }}"
          if (-not $installer -or -not (Test-Path $installer)) {
            # 回退：扫描 Output 目录找 *Setup*.exe。
            $found = Get-ChildItem -Path "script\windows\Output" -Filter "*Setup*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $found) { Write-Error "找不到安装包产物"; exit 1 }
            $installer = $found.FullName
          }
          Write-Output "installer=$installer"
          "installer=$installer" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: warp-${{ inputs.channel || 'oss' }}-x86_64-${{ inputs.profile || 'release' }}-setup
          path: ${{ steps.paths.outputs.installer }}
          if-no-files-found: error
          retention-days: 14

      # ===== tag 触发：把安装包附加到 GitHub Release（仅可下载，不接 in-app 自更新）=====
      - name: Upload installer to GitHub Release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = $env:GITHUB_REF_NAME
          $installer = "${{ steps.paths.outputs.installer }}"
          # mac workflow 可能已为同 tag 建好 release；存在则直接上传资产，否则重试等待其出现。
          # 注意：$ErrorActionPreference='Stop' 不拦截原生命令（gh）的非零退出，
          # 必须显式检查 $LASTEXITCODE，否则上传失败仍会 exit 0 留下「绿但无产物」。
          for ($i = 1; $i -le 5; $i++) {
            gh release view $tag 2>$null | Out-Null
            if ($LASTEXITCODE -eq 0) {
              gh release upload $tag $installer --clobber
              if ($LASTEXITCODE -ne 0) { Write-Error "gh release upload 失败 (exit $LASTEXITCODE)"; exit 1 }
              exit 0
            }
            Start-Sleep -Seconds ($i * 3)
          }
          # 5 次后仍无 release（纯 Windows tag 场景）：自行创建。
          gh release create $tag $installer --title $tag --generate-notes
          if ($LASTEXITCODE -ne 0) { Write-Error "gh release create 失败 (exit $LASTEXITCODE)"; exit 1 }
